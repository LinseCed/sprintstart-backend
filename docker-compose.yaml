services:
  database:
    image: postgres:16
    container_name: sprintstart-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - sprintstart-db-data:/var/lib/postgresql/data

volumes:
  sprintstart-db-data: